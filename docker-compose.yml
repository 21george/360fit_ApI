version: '3.8'

services:
  app:
    build: .
    container_name: php_api
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: myapp
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: